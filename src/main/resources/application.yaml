spring:
  main:
    web-application-type: servlet

  application:
    name: event-api

  datasource:
    url: jdbc:postgresql://localhost:5432/titri_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: root
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
storage:
  s3:
    enabled: false
